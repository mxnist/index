<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イベントプログラムタイマー</title>
    
    <meta name="apple-mobile-web-app-title" content="ProTimer">
    
    <link rel="apple-touch-icon" href="https://drive.google.com/uc?export=view&id=1GX6rNN9sU3XtTOcfncRZedDXnRqQsyDC">

    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #121212; 
            --text-color: #aaaaaa; 
            --title-color: #ffffff;
            --accent-color: #00ff00; /* 蛍光グリーン */
            --alert-color: #ff3333;  /* 警告レッド */
            --clock-color: #00ffff;  /* シアン */
            
            --btn-bg: #222222;
            --btn-text: #888888;
            --btn-hover: #333333;
            --btn-border: #444444;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        body:has(.ios-fullscreen) {
            overflow: hidden !important;
        }

        .container {
            max-width: 850px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #666666; 
            font-size: 1.2rem;
            font-weight: normal;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #222;
            margin-bottom: 20px;
            position: relative;
        }

        /* タイマー表示部分 */
        .timer-display {
            text-align: center;
            padding: 30px 20px;
            transition: all 0.3s ease;
        }

        /* 【iOS対応】疑似フルスクリーンクラス */
        .timer-display.ios-fullscreen {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 9999 !important;
            background-color: #000000 !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
            align-items: center !important;
            box-sizing: border-box !important;
            padding: 5vh 5vw !important;
            margin: 0 !important;
            border: none !important;
            border-radius: 0 !important;
            overflow: hidden;
        }

        /* 日付・時刻共通スタイル */
        .top-info {
            font-size: 1.2rem;
            color: var(--clock-color);
            font-family: monospace;
            margin-bottom: 10px;
            opacity: 0.8;
            letter-spacing: 2px;
        }
        .timer-display.ios-fullscreen .top-info {
            font-size: 3.8rem;
            margin-bottom: 3vh;
            opacity: 0.9;
        }

        /* プログラムタイトル */
        .current-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--title-color);
        }
        .timer-display.ios-fullscreen .current-title {
            font-size: 4.5rem;
            margin-bottom: 1vh;
        }

        /* タイマー数字 */
        .time-left {
            font-size: 5.5rem;
            font-weight: bold;
            font-family: monospace;
            color: var(--accent-color);
            text-shadow: 0 0 12px rgba(0, 255, 0, 0.4);
            margin: 5px 0;
        }
        .timer-display.ios-fullscreen .time-left {
            font-size: 32vh;
            line-height: 1;
            margin: 2vh 0;
            text-shadow: 0 0 35px rgba(0, 255, 0, 0.8);
        }

        /* アラート状態のスタイル */
        .time-left.alert-mode {
            color: var(--alert-color) !important;
            text-shadow: 0 0 12px rgba(255, 51, 51, 0.6) !important;
            animation: blink 1s step-end infinite;
        }
        .timer-display.ios-fullscreen .time-left.alert-mode {
            text-shadow: 0 0 35px rgba(255, 51, 51, 0.9) !important;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        .sec-red {
            font-size: 0.7em;
            color: #ff3333;
            text-shadow: 0 0 12px rgba(255, 51, 51, 0.5);
        }
        .timer-display.ios-fullscreen .sec-red {
            text-shadow: 0 0 35px rgba(255, 51, 51, 0.8);
        }

        .next-title {
            font-size: 1.1rem;
            color: #666666;
        }
        .timer-display.ios-fullscreen .next-title {
            font-size: 2.5rem;
            color: #555555;
            margin-top: 2vh;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            min-height: 38px;
        }

        button {
            padding: 8px 16px;
            font-size: 0.9rem;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: 1px solid var(--btn-border);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-appearance: none; 
        }
        button:hover {
            background-color: var(--btn-hover);
            color: #ffffff;
            border-color: #666666;
        }
        button:disabled {
            background-color: #0a0a0a;
            border-color: #1a1a1a;
            color: #333333;
            cursor: not-allowed;
        }

        /* 全画面ボタンの配置修正 */
        .fullscreen-btn {
            position: absolute;
            top: 75px; 
            right: 15px;
            font-size: 0.8rem;
            z-index: 10000;
        }
        .timer-display.ios-fullscreen .fullscreen-btn {
            top: 20px;
            right: 20px;
            font-size: 1.2rem;
            opacity: 0.4;
        }
        .fullscreen-btn:hover {
            opacity: 1.0;
        }

        /* タイムテーブル設定フォーム */
        .form-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 5px; }
        .form-row .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-row .form-group.flex-grow { flex: 1; min-width: 180px; }
        label { font-size: 0.8rem; color: #666666; }
        input[type="time"], input[type="text"], input[type="number"], select { background-color: #161616; border: 1px solid #333; border-radius: 4px; color: #999999; padding: 8px; font-size: 0.9rem; font-family: monospace; box-sizing: border-box; -webkit-appearance: none; }
        input[type="text"], select { font-family: sans-serif; }
        input:focus, select:focus { outline: none; border-color: #555555; color: #ffffff; }
        input[type="number"] { width: 90px; }
        .table-list { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        .table-list th, .table-list td { border: 1px solid #222; padding: 10px; text-align: left; }
        .table-list th { background-color: #161616; color: #888888; }
        .active-row { background-color: #1a252f !important; color: #ffffff; border-left: 4px solid var(--accent-color); }
        .storage-zone { padding-bottom: 15px; margin-bottom: 15px; border-bottom: 1px dashed #333; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; }

        /* 行内編集用のスタイル調整 */
        .inline-edit-input { width: 100%; box-sizing: border-box; }
        .inline-edit-num { width: 70px !important; }
        .insert-row { background-color: #1e1e1e !important; border-left: 4px solid #00ffff; }

        @media (max-height: 440px) and (orientation: landscape) {
            .timer-display.ios-fullscreen { padding: 2vh 2vw !important; }
            .timer-display.ios-fullscreen .top-info { font-size: 1.6rem !important; margin-bottom: 1vh !important; }
            .timer-display.ios-fullscreen .current-title { font-size: 2.0rem !important; margin-bottom: 0 !important; }
            .timer-display.ios-fullscreen .time-left { font-size: 44vh !important; margin: 0 !important; }
            .timer-display.ios-fullscreen .next-title { font-size: 1.3rem !important; margin-top: 1vh !important; }
            .timer-display.ios-fullscreen .fullscreen-btn { top: 8px !important; right: 8px !important; font-size: 0.8rem !important; padding: 4px 8px !important; }
            .timer-display.ios-fullscreen .controls { margin-top: 5px !important; }
        }

        @media (max-width: 600px) {
            .table-list { font-size: 0.75rem; }
            .table-list th, .table-list td { padding: 6px 4px; }

                font-size: 0.6em !important;
            }

</head>

<div class="container">
    <h1>⏱️ PROGRAM TIMER</h1>

    <div id="timer-area" class="card timer-display">
        <button class="fullscreen-btn" onclick="toggleFullscreen()">🗖 全画面化</button>
        
        <div id="top-info" class="top-info"></div>

        <div id="current-title" class="current-title">プログラムが登録されていません</div>

        <div id="time-left" class="time-left">00:00</div>
        
        <div id="next-title" class="next-title">次：--</div>

        <div class="controls" id="timer-controls-zone">
            <button id="btn-start" onclick="startTimer()">手動スタート</button>
            <button id="btn-pause" onclick="pauseTimer()" disabled>一時停止</button>
        </div>
    </div>

    <div class="card">
        <div class="storage-zone">
            <div class="form-group">
                <label for="save-name">このスケジュールを保存</label>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="save-name" placeholder="例: 定例会パターンA" style="width: 150px;">
                    <button onclick="saveTimetableToStorage()">保存</button>
                </div>
            </div>
            <div class="form-group">
                <label for="load-select">保存済みから呼び出し</label>
                <div style="display: flex; gap: 5px;">
                    <select id="load-select" style="width: 150px;">
                        <option value="">-- 選択してください --</option>
                    </select>
                    <button onclick="loadTimetableFromStorage()">読込</button>
                    <button class="btn-delete" onclick="deleteTimetableFromStorage()" style="padding: 8px 12px;">削除</button>
                </div>
            </div>
        </div>

        <h3 style="color:#888; font-size:1rem; margin-top:0;">📊 進行スケジュール</h3>
        <table class="table-list">
            <thead>
                <tr>
                    <th style="width: 40px;">順番</th>
                    <th style="width: 150px;">時間帯/所要時間</th>
                    <th>プログラム名</th>
                    <th style="width: 220px; text-align: center;">操作</th>
                </tr>
            </thead>
            <tbody id="timetable-body">
            </tbody>
        </table>
    </div>

    <div class="card">
        <h3 style="color:#888; font-size:1rem; margin-top:0;">📋 新しいプログラムを追加 (末尾)</h3>
        <div class="form-row">
            <div class="form-group">
                <label id="label-start" for="input-start">開始時刻</label>
                <input type="time" id="input-start" value="08:00" oninput="onStartTimeInput()">
            </div>
            <div class="form-group">
                <label for="input-duration">所要時間 (分)</label>
                <input type="number" id="input-duration" min="1" placeholder="例: 15" oninput="calculateEndTime()">
            </div>
            <div style="color: #444; margin-top: 20px;">➔</div>
            <div class="form-group">
                <label for="input-end">終了時刻</label>
                <input type="time" id="input-end" readonly style="opacity: 0.6; cursor: not-allowed;">
            </div>
            <div class="form-group">
                <label for="input-alert-min">警告 (分前)</label>
                <input type="number" id="input-alert-min" min="0" value="0" placeholder="例: 1">
            </div>
            <div class="form-group flex-grow">
                <label for="input-title">プログラム名</label>
                <input type="text" id="input-title" placeholder="例: パネルディスタッション">
            </div>
            <button id="btn-submit" onclick="submitFormItem()" style="margin-top: 20px;">追加する</button>
        </div>
    </div>
</div>

    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playBeep() {
        if (!audioCtx) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5); 
        } catch(e) {
            console.log("Audio play error:", e);
        }
    }

    function updateClock() {
        const now = new Date();
        if (timetableParsed.length > 0 && timerInterval && !isPaused) {
            checkAndSyncTime(now);
        } else {

    }
    setInterval(updateClock, 1000);
    updateClock(); 

    function toggleFullscreen() {
        const timerArea = document.getElementById('timer-area');
        const btn = document.querySelector('.fullscreen-btn');
        
        if (timerArea.classList.contains('ios-fullscreen')) {
            timerArea.classList.remove('ios-fullscreen');
            btn.textContent = "🗖 全画面化";
        } else {
            timerArea.classList.add('ios-fullscreen');
            btn.textContent = "✕ 閉じる";
            initAudio(); 
        }
    }

    function refreshTimetableStructure(keepTimerAlive = false, previousActiveTitle = null, skipBackup = false) {
        if (!baseStartTimeStr) baseStartTimeStr = "08:00";
        
        let now = new Date();
        let currentTrackDate = timeStringToDate(baseStartTimeStr, 0); 
        
        let totalMinutes = 0;
        timetableRaw.forEach(item => totalMinutes += item.duration);
        let scheduleEndDate = new Date(currentTrackDate.getTime() + totalMinutes * 60 * 1000);

        dayOffset = (now >= scheduleEndDate) ? 1 : 0;

        currentTrackDate = timeStringToDate(baseStartTimeStr, dayOffset);

        timetableParsed = timetableRaw.map(item => {
            let start = new Date(currentTrackDate.getTime());
            let end = new Date(start.getTime() + item.duration * 60 * 1000);
            currentTrackDate = end; 

            return {
                start: start,
                end: end,
                title: item.title,
                startStr: dateToTimeString(start),
                endStr: dateToTimeString(end),
                sound: item.sound !== undefined ? item.sound : true,
                alertMin: item.alertMin !== undefined ? item.alertMin : 0
            };
        });

        setupNextFormPlaceholder();

        if ((keepTimerAlive === true || keepTimerAlive === "force") && previousActiveTitle !== null) {
            const newIdx = timetableParsed.findIndex(item => item.title === previousActiveTitle);
            if (newIdx !== -1) {
                currentIndex = newIdx; 
                updateDisplayOnly();
                renderTimetableList();
                return; 
            }
        }

        autoSelectCurrentIndex();
        
        if (keepTimerAlive === "force") {
            updateDisplayOnly();
        } else if (!keepTimerAlive) {
            resetTimer();
        } else {
            updateDisplayOnly();
        }

        if (!skipBackup) {
            saveAutoBackup();
        }
        
        renderTimetableList();
    }

    function addMinutesToTimeStr(timeStr, minsToAdd) {
        if (!timeStr) return "";
        const parts = timeStr.split(':');
        let hours = parseInt(parts[0], 10);
        let minutes = parseInt(parts[1], 10);
        minutes += minsToAdd;
        hours += Math.floor(minutes / 60);
        minutes = minutes % 60;
        hours = hours % 24;
        return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
    }

    function dateToTimeString(dateObj) {
        const h = dateObj.getHours().toString().padStart(2, '0');
        const m = dateObj.getMinutes().toString().padStart(2, '0');
        return `${h}:${m}`;
    }

    function formatTimeLeftString(totalSeconds) {
        const hours = Math.floor(totalSeconds / 3600);
        const mins = Math.floor((totalSeconds % 3600) / 60);
        const secs = totalSeconds % 60;

        if (hours > 0) {
            return `${hours}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        } else {
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
    }

    // 待機時のデジタル時計（秒数入り）
    function getHMSClockHTML() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const seconds = now.getSeconds().toString().padStart(2, '0');
        return `${hours}:${minutes}<span class="sec-red">:${seconds}</span>`;
    }

    function calculateEndTime() {
        const startVal = document.getElementById('input-start').value;
        const durationVal = parseInt(document.getElementById('input-duration').value, 10);

        if (!startVal || isNaN(durationVal) || durationVal <= 0) {
            document.getElementById('input-end').value = '';
            return;
        }
        document.getElementById('input-end').value = addMinutesToTimeStr(startVal, durationVal);
    }

    function onStartTimeInput() {
        if (timetableRaw.length === 0) {
            baseStartTimeStr = document.getElementById('input-start').value || "08:00";
        }
        calculateEndTime();
    }

    function setupNextFormPlaceholder() {
        if (timetableRaw.length === 0) {
            if (!baseStartTimeStr) baseStartTimeStr = "08:00";
            document.getElementById('input-start').value = baseStartTimeStr;
            document.getElementById('input-start').disabled = false;
        } else {
            if(timetableParsed.length > 0) {
                const lastItem = timetableParsed[timetableParsed.length - 1];
                document.getElementById('input-start').value = lastItem.endStr;
            }
            document.getElementById('input-start').disabled = true;
        }
        calculateEndTime();
    }

    function timeStringToDate(timeStr, offsetDays = 0) {
        const now = new Date();
        const parts = timeStr.split(':');
        if (parts.length < 2) return null;
        return new Date(now.getFullYear(), now.getMonth(), now.getDate() + offsetDays, parseInt(parts[0], 10), parseInt(parts[1], 10), 0, 0);
    }

    function submitFormItem() {
        const duration = parseInt(document.getElementById('input-duration').value, 10);
        const title = document.getElementById('input-title').value.trim();
        let alertMin = parseInt(document.getElementById('input-alert-min').value, 10);
        if (isNaN(alertMin) || alertMin < 0) alertMin = 0;

        if (isNaN(duration) || duration <= 0 || !title) {
            alert('所要時間とプログラム名を正しく入力してください。');
            return;
        }

        const wasRunning = (timerInterval !== null);
        const activeTitleBefore = (currentIndex >= 0 && timetableParsed[currentIndex]) ? timetableParsed[currentIndex].title : null;

        if (timetableRaw.length === 0) {
            baseStartTimeStr = document.getElementById('input-start').value || "08:00";
        }
        timetableRaw.push({ duration, title, sound: false, alertMin });
        
        clearForm();
        refreshTimetableStructure(wasRunning ? true : "force", activeTitleBefore);
    }

    function editProgramItem(index) {
        insertTargetIndex = -1; 
        editTargetIndex = index;
        renderTimetableList();
    }

    function saveInlineEdit(index) {
        const row = document.getElementById(`row-${index}`);
        const newTitle = row.querySelector('.inline-title-input').value.trim();
        const newDuration = parseInt(row.querySelector('.inline-duration-input').value, 10);
        
        let newStartStr = null;
        if (index === 0) {
            newStartStr = row.querySelector('.inline-start-input').value;
        }

        if (!newTitle || isNaN(newDuration) || newDuration <= 0) {
            alert('有効なプログラム名と所要時間を入力してください。');
            return;
        }

        if (index === 0 && newStartStr) {
            baseStartTimeStr = newStartStr;
        }

        timetableRaw[index].title = newTitle;
        timetableRaw[index].duration = newDuration;

        const activeTitleBefore = (currentIndex >= 0 && timetableParsed[currentIndex]) ? timetableParsed[currentIndex].title : null;
        
        editTargetIndex = -1;
        refreshTimetableStructure("force", activeTitleBefore);
    }

    function prepareInsertItem(index) {
        editTargetIndex = -1; 
        insertTargetIndex = index;
        renderTimetableList();
    }

    function saveInlineInsert(index) {
        const row = document.getElementById(`insert-row-${index}`);
        const title = row.querySelector('.inline-insert-title').value.trim();
        const duration = parseInt(row.querySelector('.inline-insert-duration').value, 10);
        let alertMin = parseInt(row.querySelector('.inline-insert-alert').value, 10);
        if (isNaN(alertMin) || alertMin < 0) alertMin = 0;

        if (!title || isNaN(duration) || duration <= 0) {
            alert('プログラム名と所要時間を正しく入力してください。');
            return;
        }

        const activeTitleBefore = (currentIndex >= 0 && timetableParsed[currentIndex]) ? timetableParsed[currentIndex].title : null;

        timetableRaw.splice(index + 1, 0, { duration, title, sound: false, alertMin });
        
        insertTargetIndex = -1;
        refreshTimetableStructure( "force", activeTitleBefore);
    }

    function changeInlineAlertMin(index, val) {
        let minutes = parseInt(val, 10);
        if (isNaN(minutes) || minutes < 0) minutes = 0;
        
        timetableRaw[index].alertMin = minutes;
        
        const wasRunning = (timerInterval !== null);
        if (!wasRunning) {
            saveAutoBackup();
        }
    }

    function clearForm() {
        document.getElementById('input-duration').value = '';
        document.getElementById('input-title').value = '';
        document.getElementById('input-end').value = '';
        document.getElementById('input-alert-min').value = '0';
    }

    function deleteProgramItem(index) {
        if (editTargetIndex === index) editTargetIndex = -1;
        if (insertTargetIndex === index) insertTargetIndex = -1;
        const wasRunning = (timerInterval !== null);
        const activeTitleBefore = (currentIndex >= 0 && timetableParsed[currentIndex]) ? timetableParsed[currentIndex].title : null;
        
        timetableRaw.splice(index, 1);
        refreshTimetableStructure(wasRunning ? true : "force", activeTitleBefore);
    }

    function moveProgramItem(index, direction) {
        const newIndex = index + direction;
        if (newIndex < 0 || newIndex >= timetableRaw.length) return;

        const temp = timetableRaw[index];
        timetableRaw[index] = timetableRaw[newIndex];
        timetableRaw[newIndex] = temp;

        refreshTimetableStructure("force", null);
    }

    function toggleSoundItem(index) {
        if (timetableRaw[index].sound === undefined) {
            timetableRaw[index].sound = true;
        }
        timetableRaw[index].sound = !timetableRaw[index].sound;
        timetableParsed[index].sound = timetableRaw[index].sound;
        
        const btn = document.querySelector(`#row-${index} .btn-sound`);
        if (btn) {
            const isSoundOn = timetableRaw[index].sound;
            btn.className = isSoundOn ? 'btn-sound sound-on' : 'btn-sound sound-off';
            btn.title = isSoundOn ? '音をミュートする' : '音を鳴らす';
            btn.textContent = isSoundOn ? '🔊' : '🔇';
        }
        saveAutoBackup();
    }

    function autoSelectCurrentIndex() {
        if (timetableParsed.length === 0) {
            currentIndex = -1;
            return;
        }
        const now = new Date();
        const oldIndex = currentIndex;
        currentIndex = -1; 
        
        for (let i = 0; i < timetableParsed.length; i++) {
            if (now >= timetableParsed[i].start && now < timetableParsed[i].end) {
                currentIndex = i;
                break;
            }
        }
        
        if (currentIndex === -1 && timetableParsed.length > 0 && now < timetableParsed[0].start) {
            currentIndex = -1;
        }

        if (oldIndex !== currentIndex && editTargetIndex === -1 && insertTargetIndex === -1) {
            for (let i = 0; i < timetableParsed.length; i++) {
                const row = document.getElementById(`row-${i}`);
                if (row) {
                    if (i === currentIndex) {
                        row.classList.add('active-row');
                    } else {
                        row.classList.remove('active-row');
                    }
                }
            }
        }
    }

    function renderTimetableList() {
        const tbody = document.getElementById('timetable-body');
        tbody.innerHTML = '';

        if (timetableParsed.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#555;">スケジュールが登録されていません</td></tr>`;
            return;
        }

        timetableParsed.forEach((item, index) => {
            const row = document.createElement('tr');
            row.id = `row-${index}`;
            if (index === currentIndex) row.className = 'active-row';
            
            const isSoundOn = item.sound;
            const soundBtnClass = isSoundOn ? 'btn-sound sound-on' : 'btn-sound sound-off';
            const soundBtnIcon = isSoundOn ? '🔊' : '🔇';

            let itemDateLabel = "";
            let today = new Date();
            if (item.start.getDate() !== today.getDate()) {
                itemDateLabel = `<span style="color:#00ffff; font-size:0.75rem; margin-right:4px;">(翌日)</span>`;
            }

            const alertVal = item.alertMin !== undefined ? item.alertMin : 0;

            if (index === editTargetIndex) {
                const startInputHTML = index === 0 
                    ? `<input type="time" class="inline-edit-input inline-start-input" value="${baseStartTimeStr}">`
                    : `<span style="font-size:0.8rem;color:#666;">自動連動</span>`;

                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>
                        ${startInputHTML}
                        <div style="margin-top:5px; display:flex; align-items:center; gap:3px;">
                            <input type="number" class="inline-edit-input inline-edit-num inline-duration-input" min="1" value="${timetableRaw[index].duration}">分
                        </div>
                    </td>
                    <td>
                        <input type="text" class="inline-edit-input inline-title-input" value="${item.title}">
                    </td>
                    <td style="text-align: center; display: flex; gap: 4px; justify-content: center; align-items: center; flex-wrap: wrap;">
                        <button onclick="saveInlineEdit(${index})" style="background:#004d00; color:#fff; width: 80px;">保存</button>
                    </td>
                `;
                tbody.appendChild(row);
            } else {
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td class="time-range-cell">${itemDateLabel}${item.startStr} 〜 ${item.endStr}<br><span style="color:#555; font-size:0.8rem;">(${timetableRaw[index].duration}分)</span></td>
                    <td>${item.title}</td>
                    <td style="text-align: center; display: flex; gap: 4px; justify-content: center; align-items: center; flex-wrap: wrap;">
                        <button onclick="moveProgramItem(${index}, -1)" ${index === 0 ? "disabled" : ""}>↑</button>
                        <button onclick="moveProgramItem(${index}, 1)" ${index === timetableParsed.length - 1 ? "disabled" : ""}>↓</button>
                        <button class="${soundBtnClass}" onclick="toggleSoundItem(${index})" title="${isSoundOn ? '音をミュートする' : '音を鳴らす'}">${soundBtnIcon}</button>
                        
                        <div style="display: flex; align-items: center; background:#161616; border:1px solid #333; padding:2px 4px; border-radius:4px; font-size:0.8rem; color:#888;">
                            ⚠️<input type="number" class="inline-alert-input" min="0" value="${alertVal}" onchange="changeInlineAlertMin(${index}, this.value)">分前
                        </div>

                        <button class="btn-edit" onclick="editProgramItem(${index})">編集</button>
                        <button class="btn-edit" onclick="prepareInsertItem(${index})" title="このプログラムの後ろに挿入">＋</button>
                        <button class="btn-delete" onclick="deleteProgramItem(${index})">削除</button>
                    </td>
                `;
                tbody.appendChild(row);
            }

            if (index === insertTargetIndex) {
                const insertRow = document.createElement('tr');
                insertRow.id = `insert-row-${index}`;
                insertRow.className = 'insert-row';
                insertRow.innerHTML = `
                    <td>＋</td>
                    <td>
                        <span style="font-size:0.8rem;color:#888;">開始：自動連動</span>
                        <div style="margin-top:5px; display:flex; align-items:center; gap:3px;">
                            <input type="number" class="inline-edit-input inline-edit-num inline-insert-duration" min="1" placeholder="分" value="15">分
                        </div>
                    </td>
                    <td>
                        <input type="text" class="inline-edit-input inline-insert-title" placeholder="挿入するプログラム名を入力...">
                        <div style="margin-top:5px; display:flex; align-items:center; gap:4px; font-size:0.8rem; color:#666;">
                            ⚠️警告: <input type="number" class="inline-edit-input inline-edit-num inline-insert-alert" min="0" value="0"> 分前
                        </div>
                    </td>
                    <td style="text-align: center; display: flex; gap: 4px; justify-content: center; align-items: center; flex-wrap: wrap;">
                        <button onclick="saveInlineInsert(${index})" style="background:#005580; color:#fff; width: 100px;">ここに挿入</button>
                    </td>
                `;
                tbody.appendChild(insertRow);
            }
        });
    }

    function updateTimetableCellsOnly() {
        if (editTargetIndex !== -1 || insertTargetIndex !== -1) return; 
        
        let now = new Date();
        timetableParsed.forEach((item, index) => {
            const row = document.getElementById(`row-${index}`);
            if (row) {
                const cell = row.querySelector('.time-range-cell');
                if (cell) {
                    let itemDateLabel = (item.start.getDate() !== now.getDate()) ? `<span style="color:#00ffff; font-size:0.75rem; margin-right:4px;">(翌日)</span>` : "";
                    cell.innerHTML = `${itemDateLabel}${item.startStr} 〜 ${item.endStr}<br><span style="color:#555; font-size:0.8rem;">(${timetableRaw[index].duration}分)</span>`;
                }
            }
        });
        setupNextFormPlaceholder(); 
    }

    function checkAndSyncTime(now) {
        if (timetableParsed.length === 0) return;

        if (currentIndex === -1) {
            const firstProgramStart = timetableParsed[0].start;
            if (now >= firstProgramStart) {
                currentIndex = 0;
                updateTimetableCellsOnly();
            } else {
                updateDisplayOnly();
                return;
            }
        }

        const current = timetableParsed[currentIndex];
        if (now >= current.end) {
            if (current.sound) {
                playBeep();
            }
            autoSelectCurrentIndex();
            
            if (currentIndex === -1) {
                const totalEnd = timetableParsed[timetableParsed.length - 1].end;
                if (now >= totalEnd) {
                    refreshTimetableStructure(true, null);
                    return;
                }
            }
            updateTimetableCellsOnly();
        }

        if (currentIndex >= 0) {
            const targetEnd = timetableParsed[currentIndex].end;
            const diffMs = targetEnd - now;
            timeLeft = Math.max(0, Math.floor(diffMs / 1000));
        }

        updateDisplayOnly();
    }

    function updateDisplayOnly() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const date = now.getDate();
        const week = ["日", "月", "火", "水", "木", "金", "土"];
        const day = week[now.getDay()];
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');

        const topInfoEl = document.getElementById('top-info');
        const timeLeftEl = document.getElementById('time-left');
        const controlsZone = document.getElementById('timer-controls-zone');

        timeLeftEl.classList.remove('alert-mode');

        const isWaiting = (currentIndex === -1 || (timetableParsed.length > 0 && now < timetableParsed[0].start));

        if (isWaiting && timetableParsed.length > 0) {
            const nextFirst = timetableParsed[0];
            
            topInfoEl.textContent = `${year}/${month}/${date}(${day})`;
            
            document.getElementById('current-title').textContent = '';
            timeLeftEl.innerHTML = getHMSClockHTML();
            
            document.getElementById('next-title').textContent = `開始予定：${nextFirst.startStr}〜`;
            
            controlsZone.style.display = 'none';
            return;
        }

        if (timetableParsed.length === 0 || currentIndex < 0) {
            topInfoEl.textContent = '';
            document.getElementById('current-title').textContent = 'プログラムが登録されていません';
            timeLeftEl.textContent = '00:00';
            document.getElementById('next-title').textContent = '次：--';
            controlsZone.style.display = 'none';
            return;
        }

        controlsZone.style.display = 'flex';

        topInfoEl.textContent = `${year}/${month}/${date}(${day}) ${hours}:${minutes}`;
        const current = timetableParsed[currentIndex];
        
        document.getElementById('current-title').textContent = current.title;
        timeLeftEl.textContent = formatTimeLeftString(timeLeft);
        
        const alertSeconds = (current.alertMin !== undefined ? current.alertMin : 0) * 60;
        if (timeLeft <= alertSeconds && alertSeconds > 0) {
            timeLeftEl.classList.add('alert-mode');
        }
        
        const next = timetableParsed[currentIndex + 1];
        document.getElementById('next-title').textContent = next ? `次：${next.title} (${next.startStr}〜)` : '次：なし（終了後に翌日ループ）';

        document.getElementById('btn-start').disabled = (timerInterval !== null);
        document.getElementById('btn-pause').disabled = (timerInterval === null);
    }

    function startTimer() {
        if (timetableParsed.length === 0) return;
        initAudio(); 

        if (isPaused && pauseStartTime) {
            const pausedDurationMs = Date.now() - pauseStartTime;
            
            timetableParsed = timetableParsed.map(item => {
                const newStart = new Date(item.start.getTime() + pausedDurationMs);
                const newEnd = new Date(item.end.getTime() + pausedDurationMs);

                return {
                    ...item,
                    start: newStart,
                    end: newEnd,
                    startStr: dateToTimeString(newStart),
                    endStr: dateToTimeString(newEnd)
                };
            });

            baseStartTimeStr = timetableParsed[0].startStr;
            pauseStartTime = null; 
        }

        autoSelectCurrentIndex();

        if (!timerInterval) {
            isPaused = false;
            timerInterval = setInterval(() => {
                if (isPaused) return;
                updateClock(); 
            }, 1000);
        }
        
        document.getElementById('btn-start').disabled = true;
        document.getElementById('btn-pause').disabled = false;
        updateTimetableCellsOnly();
    }

    function pauseTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
            isPaused = true;
            pauseStartTime = Date.now(); 
            document.getElementById('btn-start').disabled = false;
            document.getElementById('btn-pause').disabled = true;
        }
    }

    function resetTimer() {
        isPaused = false;
        pauseStartTime = null;
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        
        refreshTimetableStructure(true, null, true);
    }

    function saveTimetableToStorage() {
        const nameInput = document.getElementById('save-name');
        const name = nameInput.value.trim();
        if (!name) {
            alert('保存名（テンプレート名）を入力してください。');
            return;
        }

        let savedData = JSON.parse(localStorage.getItem('saved_timetables') || '{}');
        savedData[name] = {
            baseStartTimeStr: baseStartTimeStr,
            timetableRaw: timetableRaw
        };

        localStorage.setItem('saved_timetables', JSON.stringify(savedData));
        nameInput.value = '';
        updateLoadSelectOptions();
        alert(`「${name}」として保存しました！`);
    }

    function loadTimetableFromStorage() {
        const select = document.getElementById('load-select');
        const name = select.value;
        if (!name) {
            alert('読み込むスケジュールを選択してください。');
            return;
        }

        let savedData = JSON.parse(localStorage.getItem('saved_timetables') || '{}');
        if (savedData[name]) {
            pauseTimer();
            baseStartTimeStr = savedData[name].baseStartTimeStr || "08:00";
            timetableRaw = savedData[name].timetableRaw || [];
            
            timetableRaw = timetableRaw.map(item => {
                if (item.alertMin === undefined) item.alertMin = 0;
                return item;
            });

            isPaused = false;
            pauseStartTime = null;
            
            refreshTimetableStructure(true); 
            startTimer();                   
        }
    }

    function deleteTimetableFromStorage() {
        const select = document.getElementById('load-select');
        const name = select.value;
        if (!name) {
            alert('削除するスケジュールを選択してください。');
            return;
        }

        if (confirm(`本当に「${name}」の保存データを削除しますか？`)) {
            let savedData = JSON.parse(localStorage.getItem('saved_timetables') || '{}');
            delete savedData[name];
            localStorage.setItem('saved_timetables', JSON.stringify(savedData));
            updateLoadSelectOptions();
            select.value = "";
        }
    }

    function updateLoadSelectOptions() {
        const select = document.getElementById('load-select');
        select.innerHTML = '<option value="">-- 選択してください --</option>';
        
        let savedData = JSON.parse(localStorage.getItem('saved_timetables') || '{}');
        Object.keys(savedData).forEach(name => {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            select.appendChild(opt);
        });
    }

    function saveAutoBackup() {
        const backup = {
            baseStartTimeStr: baseStartTimeStr,
            timetableRaw: timetableRaw
        };
        localStorage.setItem('timetable_autobackup', JSON.stringify(backup));
    }

    function initLoad() {
        // ローカルストレージを初期プリセットに更新
        let savedData = JSON.parse(localStorage.getItem('saved_timetables') || '{}');
        
        Object.keys(defaultPresetTimetables).forEach(key => {
            if (!savedData[key]) {
                savedData[key] = defaultPresetTimetables[key];
            }
        });
        localStorage.setItem('saved_timetables', JSON.stringify(savedData));

        updateLoadSelectOptions();

        const checkBackup = localStorage.getItem('timetable_autobackup');
        let hasValidBackup = false;

        if (checkBackup) {
            try {
                const parsedBackup = JSON.parse(checkBackup);
                if (parsedBackup.timetableRaw && parsedBackup.timetableRaw.length > 0) {
                    baseStartTimeStr = parsedBackup.baseStartTimeStr || "08:00";
                    timetableRaw = parsedBackup.timetableRaw.map(item => {
                        if (item.alertMin === undefined) item.alertMin = 0;
                        return item;
                    });
                    hasValidBackup = true;
                }
            } catch(e) {
                hasValidBackup = false;
            }
        }

        if (!hasValidBackup || timetableRaw.length === 0) {
            baseStartTimeStr = defaultSampleData.baseStartTimeStr;
            timetableRaw = JSON.parse(JSON.stringify(defaultSampleData.timetableRaw));
        }

        refreshTimetableStructure(false, null, true);
        
        const now = new Date();
        if (currentIndex === -1 && timetableParsed.length > 0 && now < timetableParsed[0].start) {
            timeLeft = Math.max(0, Math.floor((timetableParsed[0].start - now) / 1000));
        } else if (currentIndex >= 0) {
            timeLeft = Math.max(0, Math.floor((timetableParsed[currentIndex].end - now) / 1000));
        }

        updateDisplayOnly();
        startTimer();
    }

    initLoad();
</script>

</body>
</html>
